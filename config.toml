# Speak Easy — local Wispr Flow clone configuration

[stt]
# Whisper model: tiny.en (fastest) | base | small.en | medium | large-v3 |
# large-v3-turbo (near-large-v3 accuracy, ~4-8x faster — downloads ~1.6GB on first use)
model = "large-v3-turbo"
# "auto" tries CUDA first, falls back to CPU. Or force "cuda" / "cpu".
device = "auto"
# Compute type when on CUDA. CPU always uses int8.
compute_type = "float16"
language = "en"
# Decoding beam: 1 = fastest, 5 = most accurate. 2 is a good balance.
beam_size = 2
# Transcribe while the hotkey is held: settled speech is committed in the
# background, so on release only the last ~second needs transcribing.
streaming = true
# Speech-to-text engine: "whisper" (faster-whisper, streaming) or "parakeet"
# (NVIDIA Parakeet TDT via onnx-asr — run: pip install -r requirements-parakeet.txt;
# for GPU: pip uninstall onnxruntime && pip install onnxruntime-gpu). Non-streaming.
engine = "parakeet"
parakeet_model = "nemo-parakeet-tdt-0.6b-v2"
# Parakeet-on-GPU only: folder where the CUDA-13 runtime was installed
# (pip install --target <dir> nvidia-*-cu13). Kept separate from faster-whisper's
# CUDA-12 libs so they don't collide. Empty = CPU / no registration.
parakeet_cuda_dir = ""

[cleanup]
# Master switch for the Ollama LLM cleanup pass.
enabled = true
# Holistic cleanup (default): clean the whole utterance in one pass at release,
# so punctuation and lists are decided from the full text, not sliced at your
# pauses. Set true for per-chunk streaming (faster on long dictations, but lower
# punctuation/list quality). Streaming transcription ([stt].streaming) is separate.
streaming = false
# Use 127.0.0.1 (not "localhost") — avoids a ~2s IPv6 fallback on Windows.
ollama_url = "http://127.0.0.1:11434"
# Cleanup model: qwen2.5:3b (benchmarked fastest + best quality here) |
# llama3.2:3b | llama3.1:8b | phi3:mini | mistral:7b
ollama_model = "qwen2.5:3b"
# Every utterance goes through the LLM, however short — that's what gets
# "is it ready" typed as "Is it ready?" (Wispr Flow behavior).
# Seconds to wait for Ollama before falling back to the local-only cleanup.
timeout_seconds = 15
# On battery the GPU downclocks and the LLM runs several times slower; the
# timeout is multiplied by this so cleanup completes instead of timing out.
battery_timeout_multiplier = 4.0
# Where sentence punctuation & capitalization come from:
#   "model"  = the cleanup AI decides, from the words + context (recommended)
#   "pauses" = also feed it the pause-timing punctuation (older behavior)
# Flip this and restart to A/B the two. The offline fallback (AI off/unreachable)
# always keeps the pause punctuation either way.
punctuation_source = "model"
# Personal dictionary: terms the LLM must preserve/spell exactly. (The app's own
# name, "SpeakEasy", is handled deterministically in cleanup — no need to list
# it here, and listing single terms can make small models inject them.)
custom_vocabulary = []
# Indentation for numbered/bulleted list items, so a pasted list looks like one
# you typed. "" = flush left; "\t" = one tab; "    " = four spaces.
list_indent = "\t"
# Say "fire emoji" (or "emoji fire") and get 🔥. The word "emoji" is required,
# so ordinary speech is never rewritten ("call the fire department" is left
# alone) and an unknown name stays as words. Consecutive emoji are butted
# together, dropping the comma you paused on. Vocabulary: app/emoji.py.
spoken_emoji = true

[injection]
# "clipboard" = copy + Ctrl+V (fast, reliable; clipboard is saved & restored)
# "sendinput" = ctypes SendInput KEYEVENTF_UNICODE (types character by character)
delivery_method = "clipboard"
# Delay (seconds) between focusing back and delivering keystrokes.
paste_delay = 0.05
# Verify the paste landed (UI Automation); on a confirmed failure the text
# stays on the clipboard and a notification tells you to Ctrl+V it.
verify_paste = true
# Paste chord for detected terminals: "ctrl_v" (default; works in Windows
# Terminal, cmd, PowerShell, and TUI apps like Claude Code) or "shift_insert"
# for older consoles that only accept Shift+Insert.
terminal_paste = "ctrl_v"

[hotkey]
# Push-to-talk key. Hold to record, release to transcribe + inject.
# Syntax follows the global-hotkeys package, e.g. "f9" or "control + shift + space".
binding = "Control + Shift + Space"

[overlay]
# Wispr-style pill at the bottom center: slim bar when idle, expands into a
# live voice waveform while you dictate, gentle wave while processing.
enabled = true

[training]
# When on: after each dictation a small feedback panel appears above the
# pill. Thumbs-down + your ideal text teaches the cleanup LLM (few-shot)
# and auto-learns misheard words into the vocabulary.
enabled = true
max_examples = 5
# After thumbs-down, also fix the text already typed into the app (only if
# you haven't edited it since — otherwise it's left alone).
replace_on_correction = true
# When a correction includes what you actually said, also save that dictation's
# audio (into training_audio/, gitignored) so a later run can fine-tune the
# speech model to your voice. Turn off for text-only training / privacy.
save_correction_audio = true
# Target number of (audio, what-you-said) pairs before a voice fine-tune is
# worth attempting — shown as a progress bar in the Review panel.
target_pairs = 200

[context]
# Carry recent dictations into the next one as reference for the cleanup
# LLM (names/terms/casing consistency). Never given to Whisper — prompt
# text can leak into the transcript itself. In-memory only.
enabled = true
# Context older than this many seconds is ignored (new train of thought).
expiry_seconds = 300
# Cap on carried text, in characters.
max_chars = 600
# Read the text around the caret in the focused app (UI Automation) when
# the hotkey is pressed: dictation then continues the sentence you're in
# with correct casing, spacing, and punctuation. Password fields are never
# read; apps that expose no text (terminals, Google Docs) are skipped.
surrounding = true

[audio]
sample_rate = 16000
channels = 1
# Play a subtle low tone the moment recording starts (hotkey pressed), so you
# get non-visual confirmation the press registered.
start_sound = true
start_sound_volume = 0.3
# Recordings quieter than this are treated as silence and produce NO text, so a
# no-VAD engine (Parakeet) can't hallucinate a ghost word on an empty clip.
# Lower if quiet speech is dropped; raise if silence still gets through.
silence_floor = 0.006

[performance]
# Keep the speech + cleanup models warm: every keep_warm_interval_seconds, run a
# tiny idle inference on the STT engine and ping Ollama so neither unloads and
# the first dictation after a long pause isn't slow. Off by default — it holds
# VRAM and uses a little power while idle. Toggle it in Settings.
# 1500s (25 min) sits just under Ollama's 30-min keep_alive: enough to stop it
# unloading, without over-pinging the GPU.
keep_warm = false
keep_warm_interval_seconds = 1500.0
